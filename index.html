<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMX ELITE - V22.0 PRO FULL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #6366f1; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .master-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .btn-master { background: linear-gradient(135deg, #6366f1, #a855f7); transition: 0.3s; cursor: pointer; border-radius: 12px; font-weight: bold; border:none; color:white; }
        .btn-master:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
        .game-screen { display: none; min-height: 450px; flex-direction: column; align-items: center; justify-content: center; }
        .coin-anim { animation: rotateCoin 0.1s infinite linear; }
        @keyframes rotateCoin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(180deg); } }
        .winning-flash { animation: flash 0.3s 5 alternate; }
        @keyframes flash { from { background: transparent; } to { background: rgba(16, 185, 129, 0.3); } }
        .dice-box { width: 80px; height: 80px; background: white; color: black; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
    </style>
</head>
<body class="p-4">

<header class="max-w-7xl mx-auto flex justify-between items-center mb-6 p-4 master-card">
    <div class="flex items-center gap-2">
        <div class="h-10 w-10 bg-indigo-600 rounded-lg flex items-center justify-center font-bold">D</div>
        <h1 class="text-xl font-black italic">DIME<span class="text-indigo-500">X</span> PRO</h1>
    </div>
    <div class="flex items-center gap-4">
        <div class="text-right">
            <p class="text-[10px] text-slate-400">BALANCE</p>
            <div id="dmxDisplay" class="text-green-400 font-bold">1000.00 DMX</div>
        </div>
        <button id="connectBtn" onclick="connectWallet()" class="btn-master px-6 py-2 text-xs">CONNECT WALLET</button>
    </div>
</header>

<main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
    <div class="space-y-4">
        <div class="master-card p-4">
            <p class="text-[10px] text-slate-400 font-bold mb-2">BET AMOUNT (DMX)</p>
            <input id="betInput" type="number" value="100" class="w-full bg-black/50 p-2 rounded border border-white/10 text-center font-bold text-indigo-400">
        </div>

        <div class="master-card p-4">
            <p class="text-[10px] text-slate-400 font-bold mb-2">LIVE DMX/USDT</p>
            <div id="liveRate" class="text-sm font-mono text-yellow-500 font-bold">$0.000425</div>
            <p class="text-[8px] text-slate-500">PancakeSwap Live Rate</p>
        </div>

        <div class="master-card p-4">
            <p class="text-[10px] text-slate-400 font-bold mb-2">MY REFERRAL (5%)</p>
            <div id="refLink" onclick="copyRef()" class="text-[9px] bg-black/40 p-3 rounded border border-white/5 break-all cursor-pointer text-slate-500 hover:text-indigo-400 transition">
                Connect Wallet First
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button onclick="handleAction('Deposit')" class="bg-green-600/20 text-green-400 p-3 rounded-xl border border-green-500/30 text-xs font-bold hover:bg-green-600/40">DEPOSIT</button>
            <button onclick="handleAction('Withdraw')" class="bg-red-600/20 text-red-400 p-3 rounded-xl border border-red-500/30 text-xs font-bold hover:bg-red-600/40">WITHDRAW</button>
        </div>
        <button onclick="handleAction('Claim')" class="w-full bg-indigo-600 p-3 rounded-xl text-xs font-bold shadow-lg shadow-indigo-500/20">CLAIM REWARDS</button>
    </div>

    <div class="lg:col-span-3">
        <div id="lobby" class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div onclick="openGame('coin')" class="master-card p-8 text-center cursor-pointer hover:border-indigo-500 transition">🪙<p class="mt-2 text-sm font-bold">COIN FLIP</p></div>
            <div onclick="openGame('slot')" class="master-card p-8 text-center cursor-pointer hover:border-indigo-500 transition">🎰<p class="mt-2 text-sm font-bold">SLOTS</p></div>
            <div onclick="openGame('crash')" class="master-card p-8 text-center cursor-pointer hover:border-indigo-500 transition">🚀<p class="mt-2 text-sm font-bold">CRASH</p></div>
            <div onclick="openGame('dice')" class="master-card p-8 text-center cursor-pointer hover:border-indigo-500 transition">🎲<p class="mt-2 text-sm font-bold">DICE</p></div>
            <div onclick="openGame('battle')" class="master-card p-8 text-center cursor-pointer hover:border-indigo-500 transition">⚔️<p class="mt-2 text-sm font-bold">BATTLE</p></div>
        </div>

        <div id="gameContainer" class="game-screen master-card relative p-8">
            <div id="coinArea" class="hidden flex flex-col items-center">
                <div id="coinVisual" class="w-24 h-24 bg-yellow-500 rounded-full border-4 border-yellow-700 flex items-center justify-center text-4xl font-bold mb-6">D</div>
                <div class="flex gap-4 mb-6">
                    <button id="sideH" onclick="setSide('H')" class="px-6 py-2 border-2 border-indigo-500 rounded-lg bg-indigo-500/20">HEADS</button>
                    <button id="sideT" onclick="setSide('T')" class="px-6 py-2 border-2 border-white/10 rounded-lg">TAILS</button>
                </div>
            </div>

            <div id="diceArea" class="hidden flex flex-col items-center">
                <div id="diceVisual" class="dice-box mb-6">1</div>
                <p class="text-slate-400 mb-6 font-bold">ROLL > 3 TO WIN</p>
            </div>

            <div id="crashArea" class="hidden text-center">
                <div id="crashMult" class="text-7xl font-black text-indigo-500 mb-2">1.00x</div>
                <div class="h-2 w-full bg-slate-800 rounded-full mb-8"><div id="crashBar" class="h-full bg-indigo-500 w-0 transition-all"></div></div>
            </div>

            <div id="slotArea" class="hidden flex gap-4 text-5xl mb-8">
                <div id="s1" class="p-4 bg-black rounded-lg">💎</div>
                <div id="s2" class="p-4 bg-black rounded-lg">💎</div>
                <div id="s3" class="p-4 bg-black rounded-lg">💎</div>
            </div>

            <div id="battleArea" class="hidden flex flex-col items-center">
                <div class="flex gap-20 text-4xl font-bold mb-8">
                    <div class="text-center"><p class="text-xs">YOU</p><p id="pPower">0</p></div>
                    <div class="text-red-500"><p class="text-xs">BOSS</p><p id="bPower">0</p></div>
                </div>
            </div>

            <button id="playBtn" onclick="runGame()" class="btn-master w-64 py-4 text-lg">PLAY NOW</button>
            <button onclick="exitToLobby()" class="mt-6 text-slate-500 text-xs hover:text-white">← BACK TO LOBBY</button>
        </div>
    </div>
</main>

<script type="module">
import { createAppKit } from 'https://esm.sh/@reown/appkit?bundle'
import { Ethers5Adapter } from 'https://esm.sh/@reown/appkit-adapter-ethers5?bundle'
import { bsc } from 'https://esm.sh/@reown/appkit/networks?bundle'

// --- SOUNDS ---
const bgMusic = new Howl({ src: ['https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3'], loop: true, volume: 0.1 });
const winSound = new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3'] });
const loseSound = new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3'] });

// --- STATE ---
window.isWalletConnected = false;
window.dummyBal = 1000.00;
window.realBal = 0.00;
window.activeGame = null;
window.isPlaying = false;
let userSide = 'H';

const projectId = '059cc242b0cc96ac9665c598b76ddc7b';
const modal = createAppKit({
  adapters: [new Ethers5Adapter()],
  networks: [bsc],
  metadata: { name: 'DMX V22 PRO', url: window.location.origin },
  projectId
});

// --- WALLET CONNECT & REFERRAL ---
window.syncWallet = async () => {
    const isConnected = modal.getIsConnected();
    const btn = document.getElementById('connectBtn');
    const ref = document.getElementById('refLink');

    if (isConnected) {
        const provider = modal.getWalletProvider();
        const ethersProvider = new ethers.providers.Web3Provider(provider);
        const address = await ethersProvider.getSigner().getAddress();
        
        window.isWalletConnected = true;
        btn.innerText = address.substring(0,6) + "..." + address.substring(38);
        btn.style.background = "linear-gradient(135deg, #10b981, #059669)";
        
        ref.innerText = window.location.origin + "?ref=" + address;
        ref.classList.replace('text-slate-500', 'text-green-400');
        
        if(!bgMusic.playing()) bgMusic.play();
        log("Wallet Connected. Mode: REAL");
    } else {
        window.isWalletConnected = false;
        btn.innerText = "CONNECT WALLET";
        btn.style.background = "linear-gradient(135deg, #6366f1, #a855f7)";
    }
    updateUI();
};

modal.subscribeState(window.syncWallet);

// --- 5 GAME LOGIC ---
window.runGame = () => {
    const bet = parseFloat(document.getElementById('betInput').value);
    let bal = window.isWalletConnected ? window.realBal : window.dummyBal;

    if(bal < bet || window.isPlaying) {
        if(!window.isWalletConnected) { alert("CONNECT WALLET FIRST!"); modal.open(); return; }
        alert("Insufficient Balance!"); return;
    }

    window.isPlaying = true;
    if(window.isWalletConnected) window.realBal -= bet; else window.dummyBal -= bet;
    updateUI();

    const visual = document.getElementById('gameContainer');
    visual.classList.remove('winning-flash');

    if(window.activeGame === 'coin') {
        const cv = document.getElementById('coinVisual');
        cv.classList.add('coin-anim');
        setTimeout(() => {
            cv.classList.remove('coin-anim');
            const res = Math.random() > 0.5 ? 'H' : 'T';
            cv.innerText = res;
            finalize(res === userSide, bet, 1.95);
        }, 2000);
    } 
    else if(window.activeGame === 'dice') {
        let rolls = 0;
        const iv = setInterval(() => {
            document.getElementById('diceVisual').innerText = Math.floor(Math.random()*6)+1;
            rolls++;
            if(rolls > 15) {
                clearInterval(iv);
                const final = Math.floor(Math.random()*6)+1;
                document.getElementById('diceVisual').innerText = final;
                finalize(final > 3, bet, 2);
            }
        }, 100);
    }
    else if(window.activeGame === 'crash') {
        let m = 1.00;
        const limit = (Math.random()*3+1).toFixed(2);
        const iv = setInterval(() => {
            m += 0.05;
            document.getElementById('crashMult').innerText = m.toFixed(2) + "x";
            document.getElementById('crashBar').style.width = (m*20) + "%";
            if(m >= limit) {
                clearInterval(iv);
                finalize(Math.random() > 0.6, bet, m);
            }
        }, 100);
    }
    else if(window.activeGame === 'slot') {
        const items = ['🍒','💎','7️⃣','🍋'];
        const iv = setInterval(() => {
            document.getElementById('s1').innerText = items[Math.floor(Math.random()*4)];
            document.getElementById('s2').innerText = items[Math.floor(Math.random()*4)];
            document.getElementById('s3').innerText = items[Math.floor(Math.random()*4)];
        }, 100);
        setTimeout(() => {
            clearInterval(iv);
            const r1 = items[Math.floor(Math.random()*4)];
            const r2 = items[Math.floor(Math.random()*4)];
            const r3 = items[Math.floor(Math.random()*4)];
            document.getElementById('s1').innerText = r1; document.getElementById('s2').innerText = r2; document.getElementById('s3').innerText = r3;
            finalize(r1 === r2 && r2 === r3, bet, 10);
        }, 2000);
    }
    else if(window.activeGame === 'battle') {
        const p = Math.floor(Math.random()*100);
        const b = Math.floor(Math.random()*100);
        document.getElementById('pPower').innerText = p;
        document.getElementById('bPower').innerText = b;
        setTimeout(() => finalize(p > b, bet, 2.5), 1000);
    }
};

function finalize(won, bet, mult) {
    window.isPlaying = false;
    if(won) {
        const winAmt = bet * mult;
        if(window.isWalletConnected) window.realBal += winAmt; else window.dummyBal += winAmt;
        winSound.play();
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        document.getElementById('gameContainer').classList.add('winning-flash');
    } else {
        loseSound.play();
    }
    updateUI();
}

// --- SYSTEM FUNCTIONS ---
window.updateUI = () => {
    const val = window.isWalletConnected ? window.realBal : window.dummyBal;
    document.getElementById('dmxDisplay').innerText = val.toFixed(2) + " DMX";
};

window.handleAction = (act) => {
    if(!window.isWalletConnected) { modal.open(); return; }
    if(act === 'Deposit') {
        alert("MIN DEPOSIT: 100 DMX\n\nTransfer USDT (BEP20) to your connected wallet address.\nRate: 1 USDT = 2350 DMX (Approx)");
    } else if(act === 'Withdraw') {
        alert("Withdrawal processing via Smart Contract. Max 24 hours.");
    } else {
        alert("Claimed 5% Referral Bonus to Wallet!");
    }
};

window.openGame = (id) => {
    window.activeGame = id;
    document.getElementById('lobby').classList.add('hidden');
    document.getElementById('gameContainer').style.display = 'flex';
    ['coinArea','diceArea','crashArea','slotArea','battleArea'].forEach(a => document.getElementById(a).classList.add('hidden'));
    document.getElementById(id+'Area').classList.remove('hidden');
};

window.exitToLobby = () => {
    document.getElementById('lobby').classList.remove('hidden');
    document.getElementById('gameContainer').style.display = 'none';
};

window.setSide = (s) => {
    userSide = s;
    document.getElementById('sideH').style.background = s === 'H' ? 'rgba(99, 102, 241, 0.4)' : 'transparent';
    document.getElementById('sideT').style.background = s === 'T' ? 'rgba(99, 102, 241, 0.4)' : 'transparent';
};

window.copyRef = () => {
    if(!window.isWalletConnected) return;
    navigator.clipboard.writeText(document.getElementById('refLink').innerText);
    alert("Referral Link Copied!");
};

window.connectWallet = () => modal.open();
window.onload = () => window.updateUI();

// PANCAKESWAP LIVE CALCULATION SIMULATION
setInterval(async () => {
    const mockRate = (0.000420 + Math.random() * 0.000010).toFixed(6);
    document.getElementById('liveRate').innerText = "$" + mockRate;
}, 5000);

</script>
</body>
</html>
