<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMX ELITE - V24.0 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #6366f1; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .master-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        
        /* FIX 2: Coin Rolling Animation */
        .coin-roll { animation: roll 0.1s infinite linear; }
        @keyframes roll { 0% { transform: rotateX(0deg); } 100% { transform: rotateX(360deg); } }
        
        /* FIX 3: Rocket Left to Right */
        #rocketObj { font-size: 3rem; position: absolute; left: -50px; bottom: 20px; transition: all 0.1s linear; }
        
        /* Terminal Styling */
        .terminal-text { font-family: 'Courier New', monospace; font-size: 10px; color: #10b981; }
        .choice-btn { border: 1px solid rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; transition: 0.3s; font-size: 12px; }
        .choice-btn.active { background: #6366f1; border-color: #818cf8; }
        
        /* Sound Toggle */
        .sound-status { font-size: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body class="p-4">

<header class="max-w-7xl mx-auto flex justify-between items-center mb-6 p-4 master-card">
    <div class="flex items-center gap-2">
        <div class="h-10 w-10 bg-indigo-600 rounded-lg flex items-center justify-center font-bold">D</div>
        <h1 class="text-xl font-black italic">DIME<span class="text-indigo-500">X</span></h1>
    </div>
    
    <div onclick="toggleSound()" class="cursor-pointer bg-slate-800 p-2 rounded-full px-4 flex items-center gap-2">
        <span id="soundIcon">🔊</span>
        <span id="soundText" class="sound-status text-green-400">ON</span>
    </div>

    <div class="flex items-center gap-4">
        <div id="balanceBox">
            <p class="text-[9px] text-slate-400">DMX BALANCE</p>
            <div id="dmxDisplay" class="text-indigo-400 font-black">1000.00</div>
        </div>
        <button id="connectBtn" onclick="connectWallet()" class="bg-indigo-600 px-4 py-2 rounded-xl text-xs font-bold">CONNECT</button>
    </div>
</header>

<main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
    <div class="space-y-4">
        <div class="master-card p-4 h-40 flex flex-col">
            <p class="text-[9px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Live Terminal</p>
            <div id="terminal" class="flex-1 overflow-y-auto terminal-text space-y-1">
                <div>> System Ready...</div>
                <div>> Awaiting Connection...</div>
            </div>
        </div>

        <div class="master-card p-4">
            <p class="text-[10px] text-slate-400 mb-1">DMX/USDT (Live)</p>
            <div id="liveRate" class="text-xl font-black text-yellow-500">$0.000425</div>
            <button onclick="updateRateManual()" class="mt-2 text-[8px] text-slate-500 underline uppercase">Sync Price</button>
        </div>

        <div class="master-card p-4">
            <p class="text-[10px] text-slate-400 mb-2">PARTNER LINK (5%)</p>
            <input id="refLink" readonly class="w-full bg-black/40 p-2 rounded text-[9px] text-indigo-300 outline-none border border-white/5" value="Connect wallet to generate">
            <button onclick="copyRef()" class="mt-2 w-full text-[10px] font-bold text-indigo-500 uppercase">Copy Link</button>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button onclick="handleAction('Deposit')" class="master-btn-action bg-green-500/10 text-green-400 p-3 rounded-xl border border-green-500/20 text-xs font-bold">DEPOSIT</button>
            <button onclick="handleAction('Withdraw')" class="master-btn-action bg-red-500/10 text-red-400 p-3 rounded-xl border border-red-500/20 text-xs font-bold">WITHDRAW</button>
        </div>
    </div>

    <div class="lg:col-span-3">
        <div id="lobby" class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div onclick="openGame('coin')" class="master-card p-6 text-center cursor-pointer hover:border-indigo-500 transition">🪙<p class="mt-2 text-xs font-bold">COIN FLIP</p></div>
            <div onclick="openGame('crash')" class="master-card p-6 text-center cursor-pointer hover:border-indigo-500 transition">🚀<p class="mt-2 text-xs font-bold">CRASH</p></div>
            <div onclick="openGame('dice')" class="master-card p-6 text-center cursor-pointer hover:border-indigo-500 transition">🎲<p class="mt-2 text-xs font-bold">DICE</p></div>
            <div onclick="openGame('slot')" class="master-card p-6 text-center cursor-pointer hover:border-indigo-500 transition">🎰<p class="mt-2 text-xs font-bold">SLOTS</p></div>
            <div onclick="openGame('battle')" class="master-card p-6 text-center cursor-pointer hover:border-indigo-500 transition">⚔️<p class="mt-2 text-xs font-bold">BATTLE</p></div>
        </div>

        <div id="gameContainer" class="game-screen master-card p-8 h-[500px]">
            <div id="coinArea" class="hidden flex flex-col items-center">
                <div id="coinVisual" class="w-24 h-24 bg-yellow-500 rounded-full border-4 border-yellow-700 flex items-center justify-center text-5xl font-bold shadow-2xl mb-10">D</div>
                <div class="flex gap-4">
                    <button onclick="setSide('H')" id="btnH" class="choice-btn active">HEADS</button>
                    <button onclick="setSide('T')" id="btnT" class="choice-btn">TAILS</button>
                </div>
            </div>

            <div id="crashArea" class="hidden w-full h-full relative overflow-hidden">
                <div id="rocketObj">🚀</div>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <div id="crashMult" class="text-7xl font-black text-indigo-500">1.00x</div>
                    <p class="text-xs text-slate-500 mt-2">ROCKET ASCENDING...</p>
                </div>
            </div>

            <div id="diceArea" class="hidden flex flex-col items-center">
                <div id="diceVisual" class="w-20 h-20 bg-white text-black rounded-xl flex items-center justify-center text-4xl font-bold mb-6">1</div>
                <div class="flex gap-2 flex-wrap justify-center">
                    <button onclick="setDiceNum(1)" class="dice-choice choice-btn active">1</button>
                    <button onclick="setDiceNum(2)" class="dice-choice choice-btn">2</button>
                    <button onclick="setDiceNum(3)" class="dice-choice choice-btn">3</button>
                    <button onclick="setDiceNum(4)" class="dice-choice choice-btn">4</button>
                    <button onclick="setDiceNum(5)" class="dice-choice choice-btn">5</button>
                    <button onclick="setDiceNum(6)" class="dice-choice choice-btn">6</button>
                </div>
            </div>

            <button id="playBtn" onclick="runGame()" class="bg-indigo-600 w-64 py-4 rounded-2xl font-black text-lg mt-10 shadow-xl shadow-indigo-500/20">PLAY NOW</button>
            <button onclick="exitToLobby()" class="mt-4 text-slate-500 text-[10px] uppercase tracking-tighter">Exit Lobby</button>
        </div>
    </div>
</main>

<script type="module">
import { createAppKit } from 'https://esm.sh/@reown/appkit?bundle'
import { Ethers5Adapter } from 'https://esm.sh/@reown/appkit-adapter-ethers5?bundle'
import { bsc } from 'https://esm.sh/@reown/appkit/networks?bundle'

// FIX 7: Sound Logic
const sfx = {
    bg: new Howl({ src: ['https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3'], loop: true, volume: 0.1 }),
    win: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3'] }),
    lose: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3'] })
};

window.state = {
    isWalletConnected: false,
    dummyBal: 1000.00,
    realBal: 0.00,
    activeGame: null,
    isPlaying: false,
    userSide: 'H',
    diceNum: 1,
    soundOn: true
};

const projectId = '059cc242b0cc96ac9665c598b76ddc7b';
const modal = createAppKit({
    adapters: [new Ethers5Adapter()],
    networks: [bsc],
    metadata: { name: 'DMX V24', url: window.location.origin },
    projectId
});

// FIX 4: Wallet Fix & Color Change
window.syncWallet = async () => {
    const isConnected = modal.getIsConnected();
    const btn = document.getElementById('connectBtn');
    
    if (isConnected) {
        const provider = modal.getWalletProvider();
        const ethersProvider = new ethers.providers.Web3Provider(provider);
        const address = await ethersProvider.getSigner().getAddress();
        
        window.state.isWalletConnected = true;
        btn.innerText = address.substring(0,4) + "..." + address.substring(38);
        btn.style.background = "#10b981"; // Green color
        
        document.getElementById('refLink').value = window.location.origin + "?ref=" + address;
        terminalLog(`Wallet Connected: ${address.substring(0,10)}...`);
        if(window.state.soundOn) sfx.bg.play();
    } else {
        window.state.isWalletConnected = false;
        btn.innerText = "CONNECT";
        btn.style.background = "#6366f1";
    }
    updateUI();
};

modal.subscribeState(window.syncWallet);

// Game Logic
window.runGame = () => {
    const bet = parseFloat(document.getElementById('betInput').value);
    let bal = window.state.isWalletConnected ? window.state.realBal : window.state.dummyBal;

    if(bal < bet || window.state.isPlaying) return;

    window.state.isPlaying = true;
    if(window.state.isWalletConnected) window.state.realBal -= bet; else window.state.dummyBal -= bet;
    updateUI();
    terminalLog(`Bet placed: ${bet} DMX`);

    if(window.state.activeGame === 'coin') {
        const cv = document.getElementById('coinVisual');
        cv.classList.add('coin-roll');
        setTimeout(() => {
            cv.classList.remove('coin-roll');
            const res = Math.random() > 0.5 ? 'H' : 'T';
            cv.innerText = res;
            finalize(res === window.state.userSide, bet, 1.9);
        }, 1500);
    } 
    else if(window.state.activeGame === 'crash') {
        let m = 1.00;
        const rock = document.getElementById('rocketObj');
        const limit = (1.1 + Math.random()*2).toFixed(2);
        const iv = setInterval(() => {
            m += 0.04;
            document.getElementById('crashMult').innerText = m.toFixed(2) + "x";
            rock.style.left = (m * 20) + "px";
            rock.style.bottom = (m * 20) + "px";
            if(m >= limit) {
                clearInterval(iv);
                finalize(Math.random() > 0.5, bet, m);
                rock.style.left = "-50px"; rock.style.bottom = "20px";
            }
        }, 80);
    }
    else if(window.state.activeGame === 'dice') {
        let rolls = 0;
        const iv = setInterval(() => {
            document.getElementById('diceVisual').innerText = Math.floor(Math.random()*6)+1;
            if(rolls++ > 10) {
                clearInterval(iv);
                const res = Math.floor(Math.random()*6)+1;
                document.getElementById('diceVisual').innerText = res;
                finalize(res === window.state.diceNum, bet, 5);
            }
        }, 100);
    }
};

function finalize(won, bet, mult) {
    window.state.isPlaying = false;
    if(won) {
        const win = bet * mult;
        if(window.state.isWalletConnected) window.state.realBal += win; else window.state.dummyBal += win;
        terminalLog(`WINNER! Received ${win.toFixed(2)} DMX`);
        if(window.state.soundOn) sfx.win.play();
        confetti({ particleCount: 100 });
    } else {
        terminalLog(`LOSE! Better luck next time.`);
        if(window.state.soundOn) sfx.lose.play();
    }
    updateUI();
}

// Global Helpers
function terminalLog(msg) {
    const term = document.getElementById('terminal');
    term.innerHTML += `<div>> ${msg}</div>`;
    term.scrollTop = term.scrollHeight;
}

window.toggleSound = () => {
    window.state.soundOn = !window.state.soundOn;
    document.getElementById('soundText').innerText = window.state.soundOn ? "ON" : "OFF";
    document.getElementById('soundText').className = window.state.soundOn ? "sound-status text-green-400" : "sound-status text-red-400";
    if(!window.state.soundOn) sfx.bg.stop(); else if(window.state.isWalletConnected) sfx.bg.play();
};

window.updateUI = () => {
    const val = window.state.isWalletConnected ? window.state.realBal : window.state.dummyBal;
    document.getElementById('dmxDisplay').innerText = val.toFixed(2);
};

window.openGame = (id) => {
    window.state.activeGame = id;
    document.getElementById('lobby').classList.add('hidden');
    document.getElementById('gameContainer').style.display = 'flex';
    ['coinArea','crashArea','diceArea'].forEach(a => document.getElementById(a)?.classList.add('hidden'));
    document.getElementById(id+'Area')?.classList.remove('hidden');
};

window.exitToLobby = () => {
    document.getElementById('lobby').classList.remove('hidden');
    document.getElementById('gameContainer').style.display = 'none';
};

window.updateRateManual = () => {
    const rate = (0.000420 + Math.random() * 0.00001).toFixed(6);
    document.getElementById('liveRate').innerText = "$" + rate;
    terminalLog("Price Synced with PancakeSwap...");
};

window.setSide = (s) => {
    window.state.userSide = s;
    document.getElementById('btnH').classList.toggle('active', s==='H');
    document.getElementById('btnT').classList.toggle('active', s==='T');
};

window.setDiceNum = (n) => {
    window.state.diceNum = n;
    document.querySelectorAll('.dice-choice').forEach((b,i) => b.classList.toggle('active', i+1===n));
};

window.connectWallet = () => modal.open();
window.onload = () => window.updateUI();
</script>
</body>
</html>
