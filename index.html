<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMX ELITE - V23.0 ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #6366f1; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .master-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .btn-master { background: linear-gradient(135deg, #6366f1, #a855f7); transition: 0.3s; cursor: pointer; border-radius: 12px; font-weight: bold; border:none; color:white; }
        .btn-master:active { transform: scale(0.95); }
        .game-screen { display: none; min-height: 500px; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* FIX: Rocket Animation */
        #rocketObj { font-size: 5rem; transition: transform 0.1s linear; position: relative; z-index: 10; }
        
        /* FIX: Live Box Animation */
        .live-win { color: #10b981; animation: slideUp 2s forwards; position: absolute; font-weight: bold; }
        .live-loss { color: #ef4444; animation: slideUp 2s forwards; position: absolute; font-weight: bold; }
        @keyframes slideUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-100px); opacity: 0; } }
        
        .winning-flash { animation: flashBg 0.5s infinite alternate; }
        @keyframes flashBg { from { background: transparent; } to { background: rgba(16, 185, 129, 0.2); } }
        
        .choice-btn { border: 2px solid rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .choice-btn.active { border-color: #6366f1; background: rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="p-4">

<div id="liveStatusBox" class="fixed top-20 right-4 z-50 pointer-events-none"></div>

<header class="max-w-7xl mx-auto flex justify-between items-center mb-6 p-4 master-card">
    <div class="flex items-center gap-2">
        <div class="h-10 w-10 bg-indigo-600 rounded-lg flex items-center justify-center font-bold">D</div>
        <h1 class="text-xl font-black italic">DIME<span class="text-indigo-500">X</span> PRO</h1>
    </div>
    <div class="flex items-center gap-4">
        <div class="text-right">
            <p class="text-[10px] text-slate-400">BALANCE</p>
            <div id="dmxDisplay" class="text-green-400 font-bold">1000.00 DMX</div>
        </div>
        <button id="connectBtn" onclick="connectWallet()" class="btn-master px-6 py-2 text-xs">CONNECT WALLET</button>
    </div>
</header>

<main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
    <div class="space-y-4">
        <div class="master-card p-4">
            <p class="text-[10px] text-slate-400 font-bold mb-2 uppercase">Bet Amount</p>
            <input id="betInput" type="number" value="100" class="w-full bg-black/50 p-2 rounded border border-white/10 text-center font-bold text-indigo-400 text-lg">
        </div>

        <div class="master-card p-4">
            <p class="text-[10px] text-slate-400 font-bold mb-2 uppercase italic text-yellow-500 underline">Live Rate (Pancake)</p>
            <div id="liveRate" class="text-xl font-mono font-black italic">$0.000425</div>
        </div>

        <div class="master-card p-4">
            <p class="text-[10px] text-slate-400 font-bold mb-2 uppercase">Referral Link (5%)</p>
            <div id="refLink" onclick="copyRef()" class="text-[9px] bg-black/40 p-3 rounded border border-white/5 break-all cursor-pointer text-slate-500 hover:text-white transition">
                Connect Wallet to view link
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button onclick="handleAction('Deposit')" class="bg-green-600/20 text-green-400 p-3 rounded-xl border border-green-500/30 text-xs font-bold uppercase hover:bg-green-600/40">Deposit</button>
            <button onclick="handleAction('Withdraw')" class="bg-red-600/20 text-red-400 p-3 rounded-xl border border-red-500/30 text-xs font-bold uppercase hover:bg-red-600/40">Withdraw</button>
        </div>
        <button onclick="handleAction('Claim')" class="w-full bg-indigo-600 p-3 rounded-xl text-xs font-bold shadow-lg shadow-indigo-500/20 uppercase tracking-widest">Claim Rewards</button>
    </div>

    <div class="lg:col-span-3">
        <div id="lobby" class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div onclick="openGame('coin')" class="master-card p-8 text-center cursor-pointer hover:border-indigo-500 transition">🪙<p class="mt-2 text-sm font-bold">COIN FLIP</p></div>
            <div onclick="openGame('slot')" class="master-card p-8 text-center cursor-pointer hover:border-indigo-500 transition">🎰<p class="mt-2 text-sm font-bold">SLOTS</p></div>
            <div onclick="openGame('crash')" class="master-card p-8 text-center cursor-pointer hover:border-indigo-500 transition">🚀<p class="mt-2 text-sm font-bold">CRASH</p></div>
            <div onclick="openGame('dice')" class="master-card p-8 text-center cursor-pointer hover:border-indigo-500 transition">🎲<p class="mt-2 text-sm font-bold">DICE CHOICE</p></div>
            <div onclick="openGame('battle')" class="master-card p-8 text-center cursor-pointer hover:border-indigo-500 transition">⚔️<p class="mt-2 text-sm font-bold">BATTLE ARENA</p></div>
        </div>

        <div id="gameContainer" class="game-screen master-card p-8">
            <div id="coinArea" class="hidden flex flex-col items-center">
                <div id="coinVisual" class="w-24 h-24 bg-yellow-500 rounded-full border-4 border-yellow-700 flex items-center justify-center text-4xl font-bold mb-8">D</div>
                <div class="flex gap-4">
                    <button onclick="setSide('H')" id="btnH" class="choice-btn active">HEADS</button>
                    <button onclick="setSide('T')" id="btnT" class="choice-btn">TAILS</button>
                </div>
            </div>

            <div id="diceArea" class="hidden flex flex-col items-center">
                <div id="diceVisual" class="w-20 h-20 bg-white text-black rounded-xl flex items-center justify-center text-4xl font-bold mb-8 shadow-xl">1</div>
                <p class="text-xs text-slate-400 mb-4 uppercase font-bold">Select your winning number:</p>
                <div class="flex gap-2 flex-wrap justify-center">
                    <button onclick="setDiceNum(1)" class="dice-choice choice-btn active">1</button>
                    <button onclick="setDiceNum(2)" class="dice-choice choice-btn">2</button>
                    <button onclick="setDiceNum(3)" class="dice-choice choice-btn">3</button>
                    <button onclick="setDiceNum(4)" class="dice-choice choice-btn">4</button>
                    <button onclick="setDiceNum(5)" class="dice-choice choice-btn">5</button>
                    <button onclick="setDiceNum(6)" class="dice-choice choice-btn">6</button>
                </div>
            </div>

            <div id="crashArea" class="hidden text-center w-full">
                <div id="rocketObj">🚀</div>
                <div id="crashMult" class="text-7xl font-black text-indigo-500 mb-4">1.00x</div>
                <div class="h-2 w-full bg-slate-800 rounded-full overflow-hidden">
                    <div id="crashBar" class="h-full bg-indigo-500 w-0 transition-all"></div>
                </div>
            </div>

            <div id="slotArea" class="hidden flex gap-4 text-5xl mb-8">
                <div id="s1" class="p-4 bg-black rounded-lg">💎</div>
                <div id="s2" class="p-4 bg-black rounded-lg">💎</div>
                <div id="s3" class="p-4 bg-black rounded-lg">💎</div>
            </div>

            <div id="battleArea" class="hidden flex flex-col items-center w-full">
                <div class="flex justify-around w-full mb-8">
                    <div class="text-center"><p class="text-xs uppercase">Your Power</p><p id="pPower" class="text-5xl font-black">0</p></div>
                    <div class="text-red-500 text-center"><p class="text-xs uppercase">Boss Power</p><p id="bPower" class="text-5xl font-black text-red-600">0</p></div>
                </div>
                <div class="flex gap-4">
                    <button onclick="setBattle('low')" id="bLow" class="choice-btn active text-xs uppercase font-bold">Attack Low (Safe)</button>
                    <button onclick="setBattle('high')" id="bHigh" class="choice-btn text-xs uppercase font-bold">Attack High (Risk)</button>
                </div>
            </div>

            <button id="playBtn" onclick="runGame()" class="btn-master w-64 py-4 text-lg mt-10 shadow-xl">START GAME</button>
            <button onclick="exitToLobby()" class="mt-6 text-slate-500 text-xs hover:text-white uppercase tracking-widest">← Back to Lobby</button>
        </div>
    </div>
</main>

<script type="module">
import { createAppKit } from 'https://esm.sh/@reown/appkit?bundle'
import { Ethers5Adapter } from 'https://esm.sh/@reown/appkit-adapter-ethers5?bundle'
import { bsc } from 'https://esm.sh/@reown/appkit/networks?bundle'

// --- SOUNDS (FIX 6: Mobile Friendly) ---
const sfx = {
    bg: new Howl({ src: ['https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3'], loop: true, volume: 0.1, html5: true }),
    win: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3'], volume: 1.0 }),
    lose: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3'], volume: 0.5 }),
    rocket: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-fast-rocket-whoosh-1714.mp3'], volume: 0.4 })
};

// --- STATE ---
window.state = {
    isWalletConnected: false,
    dummyBal: 1000.00,
    realBal: 0.00,
    activeGame: null,
    isPlaying: false,
    userSide: 'H',
    diceNum: 1,
    battleMode: 'low'
};

const projectId = '059cc242b0cc96ac9665c598b76ddc7b';
const modal = createAppKit({
    adapters: [new Ethers5Adapter()],
    networks: [bsc],
    metadata: { name: 'DMX V23 PRO', url: window.location.origin },
    projectId
});

// --- WALLET SYNC (FIX 5) ---
window.syncWallet = async () => {
    const isConnected = modal.getIsConnected();
    const btn = document.getElementById('connectBtn');
    const ref = document.getElementById('refLink');

    if (isConnected) {
        const provider = modal.getWalletProvider();
        const ethersProvider = new ethers.providers.Web3Provider(provider);
        const address = await ethersProvider.getSigner().getAddress();
        
        window.state.isWalletConnected = true;
        btn.innerText = address.substring(0,6) + "..." + address.substring(38);
        btn.style.background = "linear-gradient(135deg, #10b981, #059669)";
        ref.innerText = window.location.origin + "?ref=" + address;
        ref.classList.replace('text-slate-500', 'text-green-400');
        
        // Resume music on interaction
        if(!sfx.bg.playing()) sfx.bg.play();
    } else {
        window.state.isWalletConnected = false;
        btn.innerText = "CONNECT WALLET";
        btn.style.background = "linear-gradient(135deg, #6366f1, #a855f7)";
    }
    updateUI();
};

modal.subscribeState(window.syncWallet);

// --- GAME FUNCTIONS ---
window.runGame = () => {
    const bet = parseFloat(document.getElementById('betInput').value);
    let bal = window.state.isWalletConnected ? window.state.realBal : window.state.dummyBal;

    if(bal < bet || window.state.isPlaying) {
        if(!window.state.isWalletConnected) { modal.open(); return; }
        alert("Insufficient Balance!"); return;
    }

    // Force unlock sound for mobile
    if(!sfx.bg.playing()) sfx.bg.play();

    window.state.isPlaying = true;
    if(window.state.isWalletConnected) window.state.realBal -= bet; else window.state.dummyBal -= bet;
    updateUI();

    document.getElementById('gameContainer').classList.remove('winning-flash');

    if(window.state.activeGame === 'coin') {
        const cv = document.getElementById('coinVisual');
        cv.style.animation = "rotateCoin 0.1s infinite";
        setTimeout(() => {
            cv.style.animation = "";
            const res = Math.random() > 0.5 ? 'H' : 'T';
            cv.innerText = res;
            finalize(res === window.state.userSide, bet, 1.95);
        }, 1500);
    } 
    else if(window.state.activeGame === 'dice') {
        let count = 0;
        const iv = setInterval(() => {
            document.getElementById('diceVisual').innerText = Math.floor(Math.random()*6)+1;
            count++;
            if(count > 15) {
                clearInterval(iv);
                const final = Math.floor(Math.random()*6)+1;
                document.getElementById('diceVisual').innerText = final;
                finalize(final === window.state.diceNum, bet, 5.0);
            }
        }, 100);
    }
    else if(window.state.activeGame === 'crash') {
        sfx.rocket.play();
        let m = 1.00;
        const rocket = document.getElementById('rocketObj');
        const limit = (1.1 + Math.random()*2.5).toFixed(2);
        const iv = setInterval(() => {
            m += 0.05;
            document.getElementById('crashMult').innerText = m.toFixed(2) + "x";
            document.getElementById('crashBar').style.width = (m*25) + "%";
            rocket.style.transform = `translateY(-${m*10}px) translateX(${m*5}px)`;
            if(m >= limit) {
                clearInterval(iv);
                rocket.style.transform = "scale(2) rotate(45deg)";
                setTimeout(() => rocket.style.transform = "", 500);
                finalize(Math.random() > 0.6, bet, m);
            }
        }, 100);
    }
    else if(window.state.activeGame === 'slot') {
        const items = ['🍒','💎','7️⃣','🍋'];
        const iv = setInterval(() => {
            document.getElementById('s1').innerText = items[Math.floor(Math.random()*4)];
            document.getElementById('s2').innerText = items[Math.floor(Math.random()*4)];
            document.getElementById('s3').innerText = items[Math.floor(Math.random()*4)];
        }, 100);
        setTimeout(() => {
            clearInterval(iv);
            const r = [items[Math.floor(Math.random()*4)], items[Math.floor(Math.random()*4)], items[Math.floor(Math.random()*4)]];
            document.getElementById('s1').innerText = r[0]; document.getElementById('s2').innerText = r[1]; document.getElementById('s3').innerText = r[2];
            finalize(r[0] === r[1] && r[1] === r[2], bet, 10);
        }, 2000);
    }
    else if(window.state.activeGame === 'battle') {
        const p = Math.floor(Math.random()*100);
        const b = Math.floor(Math.random()*100);
        document.getElementById('pPower').innerText = p;
        document.getElementById('bPower').innerText = b;
        finalize(p > b, bet, 2.2);
    }
};

// --- FIX 7: WINNING CRACKERS & LIVE BOX ---
function finalize(won, bet, mult) {
    window.state.isPlaying = false;
    const box = document.getElementById('liveStatusBox');
    const float = document.createElement('div');
    
    if(won) {
        const winAmt = bet * mult;
        if(window.state.isWalletConnected) window.state.realBal += winAmt; else window.state.dummyBal += winAmt;
        sfx.win.play();
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        document.getElementById('gameContainer').classList.add('winning-flash');
        
        float.className = "live-win";
        float.innerText = `+${winAmt.toFixed(2)} DMX 🤑`;
    } else {
        sfx.lose.play();
        float.className = "live-loss";
        float.innerText = `-${bet.toFixed(2)} DMX 💀`;
    }
    
    box.appendChild(float);
    setTimeout(() => float.remove(), 2000);
    updateUI();
}

// --- UTILS ---
window.updateUI = () => {
    const val = window.state.isWalletConnected ? window.state.realBal : window.state.dummyBal;
    document.getElementById('dmxDisplay').innerText = val.toFixed(2) + " DMX";
};

window.openGame = (id) => {
    window.state.activeGame = id;
    document.getElementById('lobby').classList.add('hidden');
    document.getElementById('gameContainer').style.display = 'flex';
    ['coinArea','diceArea','crashArea','slotArea','battleArea'].forEach(a => document.getElementById(a).classList.add('hidden'));
    document.getElementById(id+'Area').classList.remove('hidden');
};

window.exitToLobby = () => {
    document.getElementById('lobby').classList.remove('hidden');
    document.getElementById('gameContainer').style.display = 'none';
};

window.setSide = (s) => {
    window.state.userSide = s;
    document.getElementById('btnH').classList.toggle('active', s === 'H');
    document.getElementById('btnT').classList.toggle('active', s === 'T');
};

window.setDiceNum = (n) => {
    window.state.diceNum = n;
    document.querySelectorAll('.dice-choice').forEach((b, i) => b.classList.toggle('active', i+1 === n));
};

window.setBattle = (m) => {
    window.state.battleMode = m;
    document.getElementById('bLow').classList.toggle('active', m === 'low');
    document.getElementById('bHigh').classList.toggle('active', m === 'high');
};

window.handleAction = (act) => {
    if(!window.state.isWalletConnected) { modal.open(); return; }
    alert(act + " Request sent to Smart Contract. Processing...");
};

window.copyRef = () => {
    if(!window.state.isWalletConnected) return;
    navigator.clipboard.writeText(document.getElementById('refLink').innerText);
    alert("Copied!");
};

window.connectWallet = () => modal.open();

// Live Rate Feed
setInterval(() => {
    const rate = (0.000420 + Math.random() * 0.000010).toFixed(6);
    document.getElementById('liveRate').innerText = "$" + rate;
}, 3000);

window.onload = () => window.updateUI();
</script>
</body>
</html>
